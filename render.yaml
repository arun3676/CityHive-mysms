# Render Blueprint — provisions the Rails API as a web service.
# Docs: https://render.com/docs/blueprint-spec
#
# After the first deploy, fill in the secret values (marked sync:false) in the
# Render dashboard, then point the frontend's vercel.json at this service's URL.
services:
  - type: web
    name: cityhive-mysms-api
    runtime: ruby
    plan: free
    rootDir: backend
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MAX_THREADS
        value: "3"
      # Signs the session cookie. Auto-generated by Render.
      - key: SECRET_KEY_BASE
        generateValue: true
      # --- Secrets — set these in the Render dashboard (never committed) ---
      - key: MONGODB_URI
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      # Bonus 3 webhook target, e.g. https://<this-app>.onrender.com/api/messages/status_callback
      - key: TWILIO_STATUS_CALLBACK_URL
        sync: false
      # The deployed frontend origin, e.g. https://your-app.vercel.app
      - key: FRONTEND_ORIGIN
        sync: false
